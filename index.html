<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is It Ready? - Tailor Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f172a;
            color: white;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .header {
            background: #1e293b;
            border-bottom: 4px solid #3b82f6;
            padding: 1.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .stats {
            display: flex;
            gap: 1rem;
            font-size: 0.875rem;
        }

        .stat-item {
            background: #334155;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
        }

        .stat-item span {
            color: #3b82f6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* Dashboard Filters */
        .filter-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            overflow-x: auto;
        }

        .filter-tab {
            background: #1e293b;
            border: 2px solid #334155;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .filter-tab.active {
            background: #3b82f6;
            border-color: #3b82f6;
        }

        /* Intake Form */
        .intake-form {
            background: #1e293b;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .form-title {
            font-size: 2rem;
            font-weight: bold;
            color: #3b82f6;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            background: #334155;
            border: 2px solid #475569;
            border-radius: 0.5rem;
            padding: 1rem;
            font-size: 1.25rem;
            color: white;
            outline: none;
        }

        .form-group input:focus {
            border-color: #3b82f6;
        }

        .note {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-top: 0.5rem;
        }

        .measurement-card {
            background: #334155;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .measurement-card h3 {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fbbf24;
            margin-bottom: 1rem;
        }

        .measurement-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .measurement-input input {
            background: #1e293b;
        }

        .measurement-input input:focus {
            border-color: #fbbf24;
        }

        .btn-submit {
            width: 100%;
            background: #3b82f6;
            color: white;
            border: none;
            padding: 1.5rem;
            border-radius: 0.75rem;
            font-weight: bold;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
        }

        .btn-submit:hover {
            background: #2563eb;
        }

        /* Orders */
        .orders-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .empty-state {
            background: #1e293b;
            border-radius: 0.75rem;
            padding: 3rem;
            text-align: center;
        }

        .empty-state p {
            font-size: 1.25rem;
            color: #94a3b8;
        }

        .order-card {
            background: white;
            color: #0f172a;
            border-radius: 0.75rem;
            padding: 1.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 4px solid #cbd5e1;
            position: relative;
        }

        .order-card.ready {
            border-color: #22c55e;
        }

        .order-card.paid {
            border-color: #8b5cf6;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .order-info h3 {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.25rem;
        }

        .order-phone {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #64748b;
            font-size: 1rem;
        }

        .order-badges {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            align-items: flex-end;
        }

        .badge {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-weight: bold;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .badge.ready {
            background: #22c55e;
            color: white;
        }

        .badge.paid {
            background: #8b5cf6;
            color: white;
        }

        .badge.pending {
            background: #f59e0b;
            color: white;
        }

        .measurements-box {
            background: #f1f5f9;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .measurements-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            text-align: center;
        }

        .measurement-item {
            padding: 0.5rem;
        }

        .measurement-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #64748b;
            font-weight: 600;
        }

        .measurement-value {
            font-size: 1.125rem;
            font-weight: bold;
            margin-top: 0.25rem;
        }

        .order-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .btn-action {
            padding: 1rem;
            border-radius: 0.5rem;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-ready {
            background: #22c55e;
            color: white;
            grid-column: 1 / -1;
        }

        .btn-ready:hover {
            background: #16a34a;
        }

        .btn-paid {
            background: #8b5cf6;
            color: white;
        }

        .btn-paid:hover {
            background: #7c3aed;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
        }

        .btn-delete:hover {
            background: #dc2626;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1e293b;
            border-top: 2px solid #334155;
            display: flex;
            justify-content: space-around;
            padding: 0.75rem;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            padding: 0.5rem 1rem;
            color: #94a3b8;
            cursor: pointer;
            border-radius: 0.5rem;
            transition: all 0.2s;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .nav-item.active {
            color: #3b82f6;
            background: #334155;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
        }

        @media (max-width: 640px) {
            .measurement-grid {
                grid-template-columns: 1fr;
            }

            .measurements-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .order-actions {
                grid-template-columns: 1fr;
            }

            .stats {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M12 1v6m0 6v6m-8-8h6m6 0h6"></path>
                </svg>
                <h1>Is It Ready?</h1>
            </div>
            <div class="stats">
                <div class="stat-item">Live: <span id="liveCount">0</span></div>
                <div class="stat-item">Completed: <span id="completedCount">0</span></div>
            </div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Dashboard Screen -->
        <div class="screen active" id="dashboardScreen">
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">All Orders</button>
                <button class="filter-tab" data-filter="in-progress">In Progress</button>
                <button class="filter-tab" data-filter="ready">Ready</button>
                <button class="filter-tab" data-filter="paid">Paid</button>
            </div>
            <div class="orders-container" id="ordersContainer"></div>
        </div>

        <!-- New Order Screen -->
        <div class="screen" id="newOrderScreen">
            <div class="intake-form">
                <h2 class="form-title">New Customer Order</h2>
                
                <div class="form-group">
                    <label>Customer Name *</label>
                    <input type="text" id="customerName" placeholder="Enter name">
                </div>

                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" id="customerPhone" placeholder="919876543210">
                    <p class="note">Include country code (e.g., 91 for India)</p>
                </div>

                <div class="measurement-card">
                    <h3>📏 Measurement Card</h3>
                    <div class="measurement-grid">
                        <div class="form-group measurement-input">
                            <label>Length</label>
                            <input type="text" id="length" placeholder="inches">
                        </div>
                        <div class="form-group measurement-input">
                            <label>Chest</label>
                            <input type="text" id="chest" placeholder="inches">
                        </div>
                        <div class="form-group measurement-input">
                            <label>Waist</label>
                            <input type="text" id="waist" placeholder="inches">
                        </div>
                        <div class="form-group measurement-input">
                            <label>Shoulder</label>
                            <input type="text" id="shoulder" placeholder="inches">
                        </div>
                        <div class="form-group measurement-input">
                            <label>Sleeves</label>
                            <input type="text" id="sleeves" placeholder="inches">
                        </div>
                    </div>
                </div>

                <button class="btn-submit" id="addOrderBtn">Add Order</button>
            </div>
        </div>

        <!-- Previous Orders Screen -->
        <div class="screen" id="previousOrdersScreen">
            <h2 style="font-size: 2rem; font-weight: bold; margin-bottom: 1.5rem;">Previous Orders</h2>
            <div class="orders-container" id="previousOrdersContainer"></div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active" data-screen="dashboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            <span>Dashboard</span>
        </div>
        <div class="nav-item" data-screen="newOrder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="16"></line>
                <line x1="8" y1="12" x2="16" y2="12"></line>
            </svg>
            <span>New Order</span>
        </div>
        <div class="nav-item" data-screen="previousOrders">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 11 12 14 22 4"></polyline>
                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
            </svg>
            <span>Previous</span>
        </div>
    </div>

    <script>
        let currentScreen = 'dashboard';
        let currentFilter = 'all';
        let orders = [
            {
                id: 1,
                name: 'Rajesh Kumar',
                phone: '919876543210',
                measurements: { length: '40', chest: '38', waist: '32', shoulder: '16', sleeves: '24' },
                status: 'ready',
                paid: false,
                date: new Date().toISOString()
            },
            {
                id: 2,
                name: 'Priya Singh',
                phone: '919876543211',
                measurements: { length: '38', chest: '34', waist: '28', shoulder: '14', sleeves: '22' },
                status: 'in-progress',
                paid: false,
                date: new Date().toISOString()
            }
        ];

        function updateStats() {
            const liveCount = orders.filter(o => o.status !== 'completed').length;
            const completedCount = orders.filter(o => o.status === 'completed').length;
            document.getElementById('liveCount').textContent = liveCount;
            document.getElementById('completedCount').textContent = completedCount;
        }

        function switchScreen(screenName) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(screenName + 'Screen').classList.add('active');
            document.querySelector(`[data-screen="${screenName}"]`).classList.add('active');
            
            currentScreen = screenName;
            
            if (screenName === 'dashboard') renderOrders();
            if (screenName === 'previousOrders') renderPreviousOrders();
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderOrders();
        }

        function addOrder() {
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const length = document.getElementById('length').value.trim();
            const chest = document.getElementById('chest').value.trim();
            const waist = document.getElementById('waist').value.trim();
            const shoulder = document.getElementById('shoulder').value.trim();
            const sleeves = document.getElementById('sleeves').value.trim();

            if (!name || !phone) {
                alert('Name and Phone are required');
                return;
            }

            const newOrder = {
                id: Date.now(),
                name,
                phone,
                measurements: { length, chest, waist, shoulder, sleeves },
                status: 'in-progress',
                paid: false,
                date: new Date().toISOString()
            };

            orders.unshift(newOrder);

            document.getElementById('customerName').value = '';
            document.getElementById('customerPhone').value = '';
            document.getElementById('length').value = '';
            document.getElementById('chest').value = '';
            document.getElementById('waist').value = '';
            document.getElementById('shoulder').value = '';
            document.getElementById('sleeves').value = '';

            switchScreen('dashboard');
        }

        function markReady(orderId) {
            const order = orders.find(o => o.id === orderId);
            if (!order) return;

            order.status = 'ready';
            
            const message = encodeURIComponent(`Hello ${order.name}, your order is ready for pickup! 🎉`);
            const whatsappUrl = `https://wa.me/${order.phone}?text=${message}`;
            
            window.open(whatsappUrl, '_blank');
            renderOrders();
            updateStats();
        }

        function markPaid(orderId) {
            const order = orders.find(o => o.id === orderId);
            if (!order) return;

            order.paid = true;
            order.status = 'completed';
            renderOrders();
            updateStats();
        }

        function deleteOrder(orderId) {
            if (confirm('Are you sure you want to delete this order?')) {
                orders = orders.filter(o => o.id !== orderId);
                renderOrders();
                updateStats();
            }
        }

        function getFilteredOrders() {
            if (currentFilter === 'all') return orders.filter(o => o.status !== 'completed');
            if (currentFilter === 'in-progress') return orders.filter(o => o.status === 'in-progress');
            if (currentFilter === 'ready') return orders.filter(o => o.status === 'ready');
            if (currentFilter === 'paid') return orders.filter(o => o.paid);
            return orders;
        }

        function renderOrders() {
            const container = document.getElementById('ordersContainer');
            const filteredOrders = getFilteredOrders();

            if (filteredOrders.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No orders found</p></div>';
                return;
            }

            container.innerHTML = filteredOrders.map(order => {
                const measurements = Object.entries(order.measurements)
                    .filter(([_, value]) => value)
                    .map(([key, value]) => `
                        <div class="measurement-item">
                            <div class="measurement-label">${key}</div>
                            <div class="measurement-value">${value}"</div>
                        </div>
                    `).join('');

                return `
                    <div class="order-card ${order.status} ${order.paid ? 'paid' : ''}">
                        <div class="order-header">
                            <div class="order-info">
                                <h3>${order.name}</h3>
                                <div class="order-phone">📞 ${order.phone}</div>
                            </div>
                            <div class="order-badges">
                                ${order.status === 'ready' ? '<span class="badge ready">✓ Ready</span>' : ''}
                                ${order.paid ? '<span class="badge paid">💰 Paid</span>' : ''}
                                ${order.status === 'in-progress' ? '<span class="badge pending">⏳ In Progress</span>' : ''}
                            </div>
                        </div>

                        ${measurements ? `
                            <div class="measurements-box">
                                <div class="measurements-grid">${measurements}</div>
                            </div>
                        ` : ''}

                        <div class="order-actions">
                            ${order.status === 'in-progress' ? `
                                <button class="btn-action btn-ready" onclick="markReady(${order.id})">
                                    ✅ Mark Ready
                                </button>
                            ` : ''}
                            ${order.status === 'ready' && !order.paid ? `
                                <button class="btn-action btn-paid" onclick="markPaid(${order.id})">
                                    💰 Mark Paid
                                </button>
                            ` : ''}
                            <button class="btn-action btn-delete" onclick="deleteOrder(${order.id})">
                                🗑️ Delete
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderPreviousOrders() {
            const container = document.getElementById('previousOrdersContainer');
            const completedOrders = orders.filter(o => o.status === 'completed');

            if (completedOrders.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No previous orders</p></div>';
                return;
            }

            container.innerHTML = completedOrders.map(order => {
                const measurements = Object.entries(order.measurements)
                    .filter(([_, value]) => value)
                    .map(([key, value]) => `
                        <div class="measurement-item">
                            <div class="measurement-label">${key}</div>
                            <div class="measurement-value">${value}"</div>
                        </div>
                    `).join('');

                return `
                    <div class="order-card paid">
                        <div class="order-header">
                            <div class="order-info">
                                <h3>${order.name}</h3>
                                <div class="order-phone">📞 ${order.phone}</div>
                            </div>
                            <span class="badge paid">💰 Paid</span>
                        </div>
                        ${measurements ? `
                            <div class="measurements-box">
                                <div class="measurements-grid">${measurements}</div>
                            </div>
                        ` : ''}
                        <div class="order-actions">
                            <button class="btn-action btn-delete" onclick="deleteOrder(${order.id})">
                                🗑️ Delete
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => switchScreen(item.dataset.screen));
        });

        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => setFilter(tab.dataset.filter));
        });

        document.getElementById('addOrderBtn').addEventListener('click', addOrder);

        renderOrders();
        updateStats();
    </script>
</body>
</html>
